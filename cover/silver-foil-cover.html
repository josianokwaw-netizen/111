<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>银色锡纸蓝字封面</title>
<style>
  /* ============================================================
     【编辑区】只改这里的文字即可，排版/材质会自动适配
     ============================================================ */
  :root{
    --klein: #002FA7;          /* 统一克莱因蓝，勿改深浅 */
    --w: 1600px;               /* 16:9 画幅 */
    --h: 900px;
  }

  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#2b2d31;display:flex;align-items:center;justify-content:center;min-height:100vh}

  .cover{
    position:relative;
    width:var(--w); height:var(--h);
    overflow:hidden;
    font-family:"PingFang SC","Microsoft YaHei","Source Han Sans SC","Noto Sans CJK SC",sans-serif;
  }

  /* 银色锡纸背景：SVG 滤镜生成揉皱金属反光 */
  .foil{position:absolute;inset:0;width:100%;height:100%;z-index:0}

  /* 内容层 */
  .content{
    position:absolute;inset:0;z-index:2;
    display:flex;align-items:center;
    padding:118px 130px;
    gap:60px;
  }

  /* 左：文字区 */
  .text{flex:1 1 56%;display:flex;flex-direction:column;justify-content:center}

  .kicker{
    display:flex;align-items:center;gap:18px;
    margin-bottom:42px;
  }
  .kicker .en{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-weight:700;font-size:18px;letter-spacing:.34em;
    color:var(--klein);
  }
  .kicker .rule{width:54px;height:2px;background:var(--klein);opacity:.85}

  .title{
    color:var(--klein);
    font-weight:600;               /* 中粗黑体，不过粗 */
    font-size:108px;
    line-height:1.18;
    letter-spacing:.04em;
  }
  .title span{display:block}

  .subtitle{
    margin-top:40px;
    color:var(--klein);
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-weight:700;font-size:22px;letter-spacing:.22em;
    opacity:.92;
  }

  /* 右：极简线条隐喻（面积 ~20%） */
  .figure{flex:0 0 30%;display:flex;align-items:center;justify-content:center}
  .figure svg{width:100%;height:auto;max-width:360px}
</style>
</head>
<body>
  <div class="cover">

    <!-- 银色锡纸材质 -->
    <svg class="foil" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="foil" x="0" y="0" width="100%" height="100%">
          <!-- 揉皱噪声：低频大褶皱 + 多倍频细纹（避免砂纸感） -->
          <feTurbulence type="fractalNoise" baseFrequency="0.0075 0.011"
                        numOctaves="5" seed="9" stitchTiles="stitch" result="turb"/>
          <!-- 漫反射：金属体感，落差大、整体偏暗以呈现银（非白纸） -->
          <feDiffuseLighting in="turb" surfaceScale="5.0" diffuseConstant="1.0"
                             lighting-color="#c9ced5" result="diff">
            <feDistantLight azimuth="235" elevation="42"/>
          </feDiffuseLighting>
          <!-- 镜面：清晰的金属高光，形成银箔反光带 -->
          <feSpecularLighting in="turb" surfaceScale="3.0" specularConstant="0.85"
                              specularExponent="22" lighting-color="#ffffff" result="spec">
            <feDistantLight azimuth="235" elevation="58"/>
          </feSpecularLighting>
          <feComposite in="spec" in2="diff" operator="arithmetic"
                       k1="0" k2="1" k3="0.6" k4="0" result="lit"/>
          <!-- 拉开金属对比（克制），落到银灰区间 -->
          <feComponentTransfer in="lit" result="bright">
            <feFuncR type="gamma" amplitude="1.0" exponent="0.85" offset="0.0"/>
            <feFuncG type="gamma" amplitude="1.0" exponent="0.85" offset="0.0"/>
            <feFuncB type="gamma" amplitude="1.0" exponent="0.85" offset="0.0"/>
          </feComponentTransfer>
          <!-- 中性偏冷的银色 -->
          <feColorMatrix in="bright" type="matrix"
            values="0.97 0    0    0 0.00
                    0    0.98 0    0 0.005
                    0    0    1.0  0 0.015
                    0    0    0    1 0"/>
        </filter>
      </defs>
      <rect width="1600" height="900" fill="#b7bcc3"/>
      <rect width="1600" height="900" filter="url(#foil)"/>
    </svg>

    <!-- 内容 -->
    <div class="content">
      <div class="text">
        <div class="kicker">
          <span class="en">METHODOLOGY · 方法论</span>
          <span class="rule"></span>
        </div>
        <h1 class="title">
          <span>从信息</span>
          <span>到认知</span>
        </h1>
        <div class="subtitle">FROM INFORMATION TO INSIGHT</div>
      </div>

      <div class="figure">
        <!-- 隐喻：入口 → 节点 → 目标（从旧状态到新状态的路径） -->
        <svg viewBox="0 0 360 260" fill="none" xmlns="http://www.w3.org/2000/svg"
             stroke="#002FA7" stroke-width="3.2"
             stroke-linecap="round" stroke-linejoin="round">
          <!-- 入口：方形（信息） -->
          <rect x="14" y="186" width="44" height="44" rx="3"/>
          <!-- 路径 -->
          <path d="M58 208 H150" />
          <!-- 中间节点 -->
          <circle cx="180" cy="208" r="22"/>
          <!-- 上升的台阶（转化） -->
          <path d="M202 208 H236 V120 H280" />
          <!-- 目标：同心圆（认知） -->
          <circle cx="312" cy="120" r="22"/>
          <circle cx="312" cy="120" r="8" fill="#002FA7" stroke="none"/>
        </svg>
      </div>
    </div>

  </div>
</body>
</html>
