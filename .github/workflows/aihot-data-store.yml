name: 📦 aihot Data Store

on:
  schedule:
    - cron: '35 0 * * *'  # 北京时间 08:35（UTC 00:35），daily-ai-news 发完 issue 后运行
  workflow_dispatch:

permissions:
  contents: write
  issues: read

jobs:
  store:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read latest AI 早报 issue and save
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(TZ='Asia/Shanghai' date '+%Y-%m-%d')
          TITLE="🌅 AI 早报 · $(TZ='Asia/Shanghai' date '+%Y年%m月%d日')"

          # 按标题搜索今日 issue
          ISSUE_JSON=$(gh issue list \
            --repo "${{ github.repository }}" \
            --search "$TITLE" \
            --json number,title,body,createdAt \
            --limit 1)

          BODY=$(echo "$ISSUE_JSON" | python3 -c "
          import json, sys
          items = json.load(sys.stdin)
          if items:
              print(items[0]['body'])
          ")

          if [ -z "$BODY" ]; then
            echo "今日 issue 未找到，跳过。"
            exit 0
          fi

          mkdir -p data/aihot

          # 保存当日文件
          echo "$BODY" > "data/aihot/${DATE}.md"

          # 覆盖 latest.md
          cp "data/aihot/${DATE}.md" data/aihot/latest.md

          echo "Saved: data/aihot/${DATE}.md"

      - name: Commit and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/aihot/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          DATE=$(TZ='Asia/Shanghai' date '+%Y-%m-%d')
          git commit -m "data(aihot): ${DATE} issue saved"
          git push origin main
