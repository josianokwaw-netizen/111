name: 🌅 Daily AI News Digest

on:
  schedule:
    - cron: '30 23 * * *'  # 北京时间次日 07:30（UTC 23:30）
  workflow_dispatch:       # 支持手动触发测试

permissions:
  issues: write
  contents: write          # 需要写回去重状态 data/feeds/seen.txt

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser -q

      - name: Build digest
        # 聚合 AI Hot + BestBlogs + AIGC Weekly + TW93，
        # 生成 digest.md 与 data/feeds/new_ids.txt
        run: python3 scripts/build_digest.py

      - name: Post as GitHub Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -s digest.md ]; then
            echo "今日暂无内容，跳过"
            exit 0
          fi
          TITLE="🌅 AI 早报 · $(TZ='Asia/Shanghai' date '+%Y年%m月%d日')"
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "$TITLE" \
            --body-file digest.md

      - name: Commit feed dedup state
        run: |
          if [ ! -s data/feeds/new_ids.txt ]; then
            echo "无新增去重 ID，跳过"
            exit 0
          fi
          cat data/feeds/new_ids.txt >> data/feeds/seen.txt
          # 只保留最近 2000 条，避免状态文件无限膨胀
          tail -n 2000 data/feeds/seen.txt > data/feeds/seen.tmp
          mv data/feeds/seen.tmp data/feeds/seen.txt
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/feeds/seen.txt
          if git diff --cached --quiet; then
            echo "无状态变更"
          else
            git commit -m "data(feeds): update dedup state"
            git push origin main
          fi
