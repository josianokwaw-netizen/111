name: 🌅 Daily AI News Digest

on:
  schedule:
    - cron: '30 23 * * *'  # 北京时间次日 07:30（UTC 23:30）
  workflow_dispatch:       # 支持手动触发测试

permissions:
  issues: write
  contents: write          # 需要写回去重状态 data/feeds/seen.txt

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser -q

      - name: Build digest
        # 聚合 AI Hot + BestBlogs + AIGC Weekly + TW93，
        # 生成 digest.md 与 data/feeds/new_ids.txt
        run: python3 scripts/build_digest.py

      - name: Post as GitHub Issue
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -s digest.md ]; then
            echo "今日暂无内容，跳过"
            exit 0
          fi
          TITLE="🌅 AI 早报 · $(TZ='Asia/Shanghai' date '+%Y年%m月%d日')"
          URL=$(gh issue create \
            --repo "${{ github.repository }}" \
            --title "$TITLE" \
            --body-file digest.md)
          echo "创建 issue: $URL"
          echo "url=$URL"            >> "$GITHUB_OUTPUT"
          echo "title=$TITLE"        >> "$GITHUB_OUTPUT"
          echo "num=${URL##*/}"      >> "$GITHUB_OUTPUT"

      - name: Push to Notion
        if: steps.issue.outputs.url != ''
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          ISSUE_URL:    ${{ steps.issue.outputs.url }}
          ISSUE_TITLE:  ${{ steps.issue.outputs.title }}
        run: python3 scripts/push_notion.py

      - name: Commit sync state
        if: always()
        run: |
          CHANGED=0

          # 1) RSS 去重状态
          if [ -s data/feeds/new_ids.txt ]; then
            cat data/feeds/new_ids.txt >> data/feeds/seen.txt
            tail -n 2000 data/feeds/seen.txt > data/feeds/seen.tmp
            mv data/feeds/seen.tmp data/feeds/seen.txt
            git add data/feeds/seen.txt && CHANGED=1
          fi

          # 2) 记录已推送 Notion 的 issue 号，避免 aihot-data-store 重复同步
          NUM="${{ steps.issue.outputs.num }}"
          if [ -n "$NUM" ]; then
            mkdir -p data/aihot
            echo "$NUM" >> data/aihot/synced_issues.txt
            git add data/aihot/synced_issues.txt && CHANGED=1
          fi

          if [ "$CHANGED" = "1" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            if git diff --cached --quiet; then
              echo "无状态变更"
            else
              git commit -m "data: update feed dedup + notion sync state"
              git push origin main
            fi
          else
            echo "无状态变更"
          fi
