name: Wiki Lint

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 00:00（北京时间 08:00）
  workflow_dispatch:      # 支持手动触发

# 防止手动触发与定时触发撞车
concurrency:
  group: wiki-lint
  cancel-in-progress: false

permissions:
  issues: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r wiki_lint/requirements.txt

      - name: Run wiki lint（x scheme + 小咪 scheme 两套系统）
        # lint.py 内部行为约定：
        #   - 检查到 wiki 问题 → 自动写回各系统 Notion 日志库，恒 exit 0
        #   - 脚本本身崩溃（网络/API/代码异常） → exit 非 0
        id: lint
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set +e
          cd wiki_lint && python lint.py > /tmp/lint_result.txt 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          cat /tmp/lint_result.txt

      - name: 崩溃告警 Issue（仅脚本崩溃时发，wiki 问题已写入 Notion 日志库）
        if: steps.lint.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="🚨 Wiki Lint 崩溃 · $(TZ='Asia/Shanghai' date '+%Y年%m月%d日')"
          {
            echo "## Wiki Lint 脚本异常退出"
            echo ""
            echo "exit_code: ${{ steps.lint.outputs.exit_code }}"
            echo ""
            echo "### 崩溃日志"
            echo '```'
            cat /tmp/lint_result.txt
            echo '```'
            echo ""
            echo "> wiki 检查结果（孤儿页/过时页等）正常时写入 Notion 日志库，此 Issue 仅代表脚本崩溃。"
          } > /tmp/crash_report.txt
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "$TITLE" \
            --body-file /tmp/crash_report.txt
