name: Wiki Lint

on:
  schedule:
    - cron: '0 1 * * 1'  # 每周一 UTC 01:00（北京时间 09:00）
  workflow_dispatch:      # 支持手动触发

permissions:
  issues: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r wiki_lint/requirements.txt

      - name: Run wiki lint
        id: lint
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set +e
          python wiki_lint/lint.py > /tmp/lint_result.txt 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          cat /tmp/lint_result.txt

      - name: Post Issue（发现问题时）
        if: steps.lint.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="🔍 Wiki Lint · $(TZ='Asia/Shanghai' date '+%Y年%m月%d日')"
          BODY=$(cat /tmp/lint_result.txt)
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "$TITLE" \
            --body "$BODY"
